# Per4Biz API — Fly.io Paris deployment
# https://fly.io/docs/reference/configuration/

app = "per4biz-api"
primary_region = "cdg"  # Paris — Madrid foi deprecated pela Fly; Paris ~25ms de Lisboa

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"    # free tier friendly
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Volumes (para SQLite fallback ou cache local se necessário futuramente)
# [[mounts]]
#   source = "per4biz_data"
#   destination = "/data"
